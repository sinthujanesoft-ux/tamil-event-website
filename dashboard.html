<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>

<body style="background:black; color:white; text-align:center; padding:50px;">

  <h1>Upload Image</h1>

  <input type="file" id="fileInput"><br><br>
  <button id="uploadBtn">Upload</button>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzrS8sC2dVxhl9M8aF0q64AD1CgtxU67A",
      authDomain: "tamil-event-website-af580.firebaseapp.com",
      projectId: "tamil-event-website-af580",
      storageBucket: "tamil-event-website-af580.firebasestorage.app",
      messagingSenderId: "375738644796",
      appId: "1:375738644796:web:2831534b15dc0c63490639"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) return alert("Select file");

      const storageRef = ref(storage, "images/" + file.name);

      await uploadBytes(storageRef, file);

      const url = await getDownloadURL(storageRef);

      alert("Uploaded successfully!\n" + url);
    });

  </script>

</body>
</html>
